<div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-blue-400 to-turquoise-500">
  <div class="bg-white/30 backdrop-blur-md p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Connexion</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <input formControlName="email" type="email" placeholder="Email"
        class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      <input formControlName="password" type="password" placeholder="Mot de passe"
        class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      <button type="submit"
        class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">Se connecter</button>
    </form>
  </div>
</div>
